name: Daily Auto Fetch

on:
  schedule:
    - cron: '0 23 * * *' # JST 08:00
  workflow_dispatch:

jobs:
  auto-fetch:
    runs-on: ubuntu-latest
    env:
      YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
      SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
      WORKSHEET_NAME: ${{ secrets.WORKSHEET_NAME }}
      GCP_SERVICE_ACCOUNT_JSON: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}
      STATUS_BATCH_LIMIT: '30'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check required secrets are set
        run: |
          test -n "${YOUTUBE_API_KEY}" && echo "YOUTUBE_API_KEY=present" || (echo "YOUTUBE_API_KEY=missing" && exit 1)
          test -n "${SPREADSHEET_ID}" && echo "SPREADSHEET_ID=present" || (echo "SPREADSHEET_ID=missing" && exit 1)
          test -n "${GCP_SERVICE_ACCOUNT_JSON}" && echo "GCP_SERVICE_ACCOUNT_JSON=present" || (echo "GCP_SERVICE_ACCOUNT_JSON=missing" && exit 1)

      - name: Run daily auto fetch
        run: python -m scripts.run_daily_auto_fetch
